name: Release
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Assert tag matches package.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag v$tag does not match package.json version $pkg. Run 'npm run bump-version $tag' before tagging." >&2
            exit 1
          fi
          echo "Tag and package.json agree on $pkg."
      - run: npm test
      - run: npm run check-version
      - run: npm run verify-contracts
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes="$(gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" -f tag_name="$GITHUB_REF_NAME" -q .body)"
          released_at="$(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M:%S')"
          {
            printf 'Released: %s (UTC+8 台北)\n\n' "$released_at"
            printf '%s\n' "$notes"
          } > release-notes.md
          gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md --verify-tag
